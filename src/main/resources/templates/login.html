<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVault — 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common.css}" href="/css/common.css">
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css">w
</head>
<body>

<!-- Ticker Bar -->
<div class="ticker-bar">
    <div class="ticker-label">LIVE</div>
    <div class="ticker-track" id="tickerTrack">
        <!-- JS로 채움 -->
    </div>
</div>

<!-- Left Panel -->
<div class="left-panel">
    <div class="grid-overlay"></div>
    <div class="radial-glow"></div>

    <!-- SVG Chart -->
    <svg class="chart-bg" viewBox="0 0 700 500" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <!-- Grid lines -->
        <g stroke="rgba(0,229,160,0.06)" stroke-width="1">
            <line x1="0" y1="100" x2="700" y2="100"/>
            <line x1="0" y1="200" x2="700" y2="200"/>
            <line x1="0" y1="300" x2="700" y2="300"/>
            <line x1="0" y1="400" x2="700" y2="400"/>
            <line x1="140" y1="0" x2="140" y2="500"/>
            <line x1="280" y1="0" x2="280" y2="500"/>
            <line x1="420" y1="0" x2="420" y2="500"/>
            <line x1="560" y1="0" x2="560" y2="500"/>
        </g>
        <!-- Area fill under main line -->
        <defs>
            <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#00e5a0" stop-opacity="0.12"/>
                <stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/>
            </linearGradient>
        </defs>
        <path d="M0,380 C60,340 100,290 160,250 S260,180 320,160 S420,140 480,110 S600,80 700,60 L700,500 L0,500 Z" fill="url(#areaGrad)"/>
        <!-- Main line (accent) -->
        <path class="chart-line line-main" d="M0,380 C60,340 100,290 160,250 S260,180 320,160 S420,140 480,110 S600,80 700,60"/>
        <!-- Secondary line (red) -->
        <path class="chart-line line-secondary" d="M0,420 C80,400 140,380 200,360 S300,300 360,320 S460,350 520,300 S640,220 700,200"/>
        <!-- Tertiary line (gold) -->
        <path class="chart-line line-tertiary" d="M0,460 C100,440 180,420 240,400 S330,370 390,350 S480,320 560,290 S660,260 700,240"/>
        <!-- Data points on main line -->
        <circle cx="160" cy="250" r="4" fill="#00e5a0" opacity="0.8"/>
        <circle cx="320" cy="160" r="4" fill="#00e5a0" opacity="0.8"/>
        <circle cx="480" cy="110" r="4" fill="#00e5a0" opacity="0.8"/>
        <circle cx="700" cy="60" r="5" fill="#00e5a0"/>
    </svg>

    <div class="brand" style="margin-top: 100px;">
        <div class="brand-logo">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <polyline points="2,14 6,9 10,11 14,5 18,7" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="brand-name">STOCK<span>VAULT</span></div>
        </div>
    </div>

    <div class="hero-section">
        <div class="hero-tag">모의 주식 투자 플랫폼</div>
        <div class="hero-title">
            TRADE
            <span class="highlight">SMARTER</span>
            TODAY
        </div>
        <p class="hero-desc">
            실전 같은 모의 투자 환경에서 리스크 없이 전략을 시험하세요.
            실시간 데이터와 포트폴리오 분석으로 투자 감각을 키워보세요.
        </p>
        <div class="stats-row">
            <div class="stat-item">
                <span class="stat-val">12,800<span class="unit">+</span></span>
                <span class="stat-label">활성 트레이더</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-val">₩2.4<span class="unit">조</span></span>
                <span class="stat-label">모의 거래량</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
                <span class="stat-val">98<span class="unit">%</span></span>
                <span class="stat-label">시장 정확도</span>
            </div>
        </div>
    </div>
</div>

<!-- Right Panel -->
<div class="right-panel">
    <div class="form-container">
        <div class="form-header">
            <div class="form-tag">// AUTHENTICATION</div>
            <div class="form-title">LOGIN</div>
            <p class="form-subtitle">
                계정이 없으신가요? <a href="/signup">회원가입 →</a>
            </p>
        </div>

        <div class="field-group">
            <div class="field" id="field-email">
                <label for="email">EMAIL ADDRESS</label>
                <div class="input-wrap">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
                    <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
                </div>
                <span class="field-error">올바른 이메일 형식을 입력해주세요.</span>
            </div>

            <div class="field" id="field-password">
                <label for="password">PASSWORD</label>
                <div class="input-wrap">
            <span class="icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                    <button class="toggle-pw" type="button" onclick="togglePw('password', this)" aria-label="비밀번호 표시">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <span class="field-error">비밀번호를 입력해주세요.</span>
            </div>
        </div>

        <div class="options-row">
            <label class="checkbox-label">
                <input type="checkbox" id="remember">
                로그인 상태 유지
            </label>
            <a href="#" class="forgot-link">비밀번호 찾기</a>
        </div>

        <button class="btn-submit" onclick="handleLogin()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="9,18 15,12 9,6"/>
            </svg>
            SIGN IN
        </button>

        <div class="login-error" id="login-error"></div>

        <div class="status-badge">
            <div class="status-dot"></div>
            256-bit SSL 암호화 · 보안 연결 유지 중
        </div>
    </div>
</div>

    <script th:src="@{/js/common.js}" src="/js/common.js"></script>
    <script th:src="@{/js/login.js}" src="/js/login.js"></script>
</body>
</html>
