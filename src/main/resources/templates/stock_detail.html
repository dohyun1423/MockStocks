<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVault - Stock Detail</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common.css}" href="/css/common.css">
    <link rel="stylesheet" th:href="@{/css/stock_detail.css}" href="/css/stock_detail.css">
    <link rel="stylesheet" th:href="@{/css/header.css}" href="/css/header.css">
    <link rel="stylesheet" th:href="@{/css/order.css}" href="/css/order.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="stock-detail-layout">
    <section class="stock-summary">
        <div class="stock-title-area">
            <p class="panel-kicker">// STOCK DETAIL</p>
            <h1 class="stock-title" th:text="${keyword}">삼성전자</h1>

            <div class="stock-meta">
                <div class="meta-item">
                    <span class="meta-label">현재가</span>
                    <strong class="meta-value" id="detail-current-price">-</strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">어제대비</span>
                    <strong class="meta-value" id="detail-change-price">-</strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">등락률</span>
                    <strong class="meta-value" id="detail-change-rate">-</strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">거래량</span>
                    <strong class="meta-value" id="detail-volume">-</strong>
                </div>
            </div>
        </div>

        <div class="stock-action-buttons">
            <button type="button" class="detail-trade-btn buy" id="detail-buy-btn">매수</button>
            <button type="button" class="detail-trade-btn sell" id="detail-sell-btn">매도</button>

            <button type="button" class="favorite-btn" id="favorite-btn" aria-label="관심종목 추가">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.08C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
            </button>
        </div>
    </section>

    <nav class="stock-tabs">
        <button type="button" class="active" data-tab="chart">차트</button>
        <button type="button" data-tab="orderbook">호가</button>
        <button type="button" data-tab="my-stock">내 주식</button>
        <button type="button" data-tab="info">종목정보</button>
    </nav>

    <section class="tab-content">
        <div class="tab-panel active" id="tab-chart">
            <div class="detail-chart-header">
                <h3 id="detail-chart-title">CHART</h3>

                <div class="detail-chart-periods">
                    <button type="button" class="active" data-chart-period="1D">1D</button>
                    <button type="button" data-chart-period="1W">1W</button>
                    <button type="button" data-chart-period="1M">1M</button>
                    <button type="button" data-chart-period="1Y">1Y</button>
                </div>
            </div>

            <div class="detail-chart-box" id="detail-chart-box">
                <div class="chart-grid"></div>
                <div class="tab-empty">
                    <p>차트 정보를 불러오는 중입니다.</p>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tab-orderbook">
            <div class="detail-orderbook-wrap" id="detail-orderbook-wrap">
                <div class="tab-empty">
                    <p>호가 정보를 불러오는 중입니다.</p>
                    <span>현재 종목의 매도/매수 호가를 조회합니다.</span>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tab-my-stock">
            <div class="detail-my-stock-wrap" id="detail-my-stock-wrap">
                <div class="tab-empty">
                    <p>내 주식 정보를 불러오는 중입니다.</p>
                    <span>현재 종목의 보유 정보와 거래내역을 조회합니다.</span>
                </div>
            </div>
        </div>

        <div class="tab-panel" id="tab-info">
            <div class="detail-info-grid" id="detail-info-grid">
                <div class="tab-empty">
                    <p>종목 정보를 불러오는 중입니다.</p>
                    <span>현재가와 기본 종목 정보를 조회합니다.</span>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/order_modal :: orderModal}"></div>

<script th:src="@{/js/header.js}" src="/js/header.js"></script>
<script th:src="@{/js/stock_detail.js}" src="/js/stock_detail.js"></script>
<script th:src="@{/js/order.js}" src="/js/order.js"></script>
</body>
</html>
