<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockVault - Main</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/common.css}" href="/css/common.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
    <link rel="stylesheet" th:href="@{/css/header.css}" href="/css/header.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="main-layout">
    <aside class="watchlist-panel">
        <div class="panel-header">
            <p class="panel-kicker">// WATCHLIST</p>
            <h2>MY STOCKS</h2>
        </div>

        <div class="empty-state">
            <p>저장한 종목이 없습니다.</p>
            <span>검색으로 관심 종목을 찾아볼 수 있습니다.</span>
        </div>
    </aside>

    <section class="chart-panel">
        <div class="panel-header">
            <p class="panel-kicker">// MARKET</p>
            <h1>CHART</h1>
        </div>

        <div class="chart-placeholder">
            <p>종목을 검색해 주세요.</p>
            <span>검색 후 종목 상세 화면으로 이동합니다.</span>
        </div>
    </section>

    <aside class="side-panel">
        <div class="panel-header">
            <p class="panel-kicker">// PANEL</p>
            <h2>DETAILS</h2>
        </div>
    </aside>
</main>

<script th:src="@{/js/header.js}" src="/js/header.js"></script>
<script th:src="@{/js/main.js}" src="/js/main.js"></script>
</body>
</html>
