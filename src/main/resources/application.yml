spring:
  profiles:
    include: secret

  datasource:
    url: jdbc:mysql://localhost:3306/mockstock
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

    show-sql: true

server:
  port: 8080